<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#130e1c">
<title>ФОРМА</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== RESET + VARS ===================== */
:root {
  --bg: #130e1c;
  --surface: #1e1630;
  --surface-2: #271e3d;
  --surface-3: #30264a;
  --teal: #8dd8cc;
  --teal-dim: #68b5a8;
  --teal-glow: rgba(141,216,204,0.2);
  --teal-glow-2: rgba(141,216,204,0.09);
  --orange: #e8a5c0;
  --orange-dim: #c97fa0;
  --orange-glow: rgba(232,165,192,0.2);
  --orange-glow-2: rgba(232,165,192,0.09);
  --text: #f0e8f8;
  --text-2: #9a87b8;
  --text-3: #5c4a78;
  --ok: #7dd9c4;
  --danger: #e888a8;
  --warn: #f5c87a;
  --sh-d: #0a0910;
  --sh-l: #2d2248;
  --border: rgba(141,216,204,0.14);
  --border-2: rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;scrollbar-width:none;-ms-overflow-style:none;}
*::-webkit-scrollbar{display:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

/* ===================== APP SHELL ===================== */
#app{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  max-width:440px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* Ambient gradient bg */
#app::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(141,216,204,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 80%, rgba(232,165,192,0.07) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.tab-content{
  flex:1;overflow-y:auto;
  padding:0 16px 90px;
  display:none;
  position:relative;z-index:1;
  padding-top:calc(env(safe-area-inset-top) + 20px);
}
.tab-content.active{display:block;animation:fadeUp .22s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ===================== BOTTOM NAV ===================== */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:440px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:200;
  box-shadow:0 -8px 32px rgba(0,0,0,0.5);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--text-3);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:0.04em;
  padding:10px 0;transition:color .2s;
}
.nav-icon{font-size:21px;transition:transform .2s;}
.nav-btn.active{color:var(--teal);}
.nav-btn.active .nav-icon{transform:scale(1.12);}

/* ===================== CARDS ===================== */
.card{
  background:var(--surface);
  border-radius:18px;
  padding:16px;
  border:1px solid var(--border-2);
  box-shadow:6px 6px 16px var(--sh-d),-3px -3px 8px var(--sh-l);
  margin-bottom:12px;
}
.card-2{
  background:var(--surface-2);
  border-radius:14px;
  padding:13px 14px;
  border:1px solid var(--border-2);
  box-shadow:4px 4px 10px var(--sh-d),-2px -2px 6px #1a2d3f;
  margin-bottom:9px;
}

/* ===================== PAGE HEADERS ===================== */
.page-header{margin-bottom:18px;}
.page-title{font-size:28px;font-weight:800;color:var(--text);line-height:1.15;}
.page-sub{font-size:13px;color:var(--text-2);margin-top:3px;font-weight:400;}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--teal-glow-2);border:1px solid rgba(0,196,180,0.3);
  color:var(--teal);font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-top:8px;
}

/* ===================== PROGRESS BAR ===================== */
.prog-wrap{margin:0 0 4px;}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:7px;}
.prog-labels strong{color:var(--teal);font-weight:700;}
.prog-bar{height:5px;background:var(--surface-3);border-radius:3px;overflow:hidden;box-shadow:inset 2px 2px 5px var(--sh-d);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-dim));border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ===================== EXERCISE ITEMS ===================== */
.ex-item{
  background:var(--surface-2);border-radius:16px;
  padding:13px 13px;margin-bottom:9px;
  border:1px solid var(--border-2);
  box-shadow:4px 4px 10px var(--sh-d),-2px -2px 6px #1a2d3f;
  transition:opacity .2s,border-color .2s;
}
.ex-item.done{opacity:.45;border-color:rgba(0,212,160,0.15);}
.ex-item.skill{border-left:3px solid var(--orange);}
.ex-row{display:flex;align-items:center;gap:10px;}

.ex-check{
  width:28px;height:28px;flex-shrink:0;
  border-radius:9px;border:2px solid var(--surface-3);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  box-shadow:3px 3px 7px var(--sh-d),-1px -1px 4px var(--sh-l);
}
.ex-check.on{background:var(--ok);border-color:var(--ok);box-shadow:0 0 12px rgba(0,212,160,0.35);}
.ex-check.on::after{content:'✓';color:#130e1c;font-size:14px;font-weight:800;}

.ex-info{flex:1;cursor:pointer;min-width:0;}
.ex-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;}
.ex-meta{font-size:11.5px;color:var(--text-2);margin-top:2px;}
.skill-tag{color:var(--orange);font-size:10px;font-weight:700;letter-spacing:0.06em;}

.timer-btn{
  background:var(--orange-glow);border:1px solid rgba(255,94,46,0.4);
  color:var(--orange);border-radius:9px;
  padding:7px 10px;font-size:17px;cursor:pointer;
  transition:all .2s;flex-shrink:0;
  box-shadow:3px 3px 7px var(--sh-d);
}
.timer-btn:active{background:var(--orange);color:#130e1c;transform:scale(.95);}

/* ===================== REST DAY ===================== */
.rest-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:52vh;text-align:center;gap:10px;
}
.rest-icon{font-size:60px;margin-bottom:4px;opacity:.8;}
.rest-title{font-size:22px;font-weight:700;color:var(--text);}
.rest-next{font-size:14px;color:var(--text-2);}
.rest-next em{color:var(--teal);font-style:normal;font-weight:600;}

/* ===================== TIMER OVERLAY ===================== */
#timer-overlay{
  display:none;position:fixed;inset:0;
  background:var(--bg);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;
}
#timer-overlay.on{display:flex;animation:fadeUp .25s ease;}

.t-ex-name{
  font-size:15px;font-weight:600;color:var(--text-2);
  text-align:center;margin-bottom:8px;max-width:280px;line-height:1.4;
}
.t-phase{
  font-size:11px;font-weight:800;letter-spacing:0.18em;
  text-transform:uppercase;margin-bottom:28px;transition:color .3s;
}
.t-phase.prep{color:var(--text-2);}
.t-phase.work{color:var(--teal);}
.t-phase.rest{color:var(--orange);}
.t-phase.done{color:var(--ok);}

.t-circle{position:relative;width:210px;height:210px;margin-bottom:28px;}
.t-circle svg{width:210px;height:210px;transform:rotate(-90deg);}
.t-track{fill:none;stroke:var(--surface-2);stroke-width:10;}
.t-ring{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .12s linear,stroke .3s;}
.t-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:62px;font-weight:800;transition:color .3s;
  font-family:'Space Grotesk',sans-serif;
}
.t-rounds{font-size:14px;color:var(--text-2);margin-bottom:36px;}
.t-rounds b{color:var(--text);font-weight:700;}

.t-stop{
  background:var(--surface);border:2px solid var(--danger);
  color:var(--danger);border-radius:50px;
  padding:14px 44px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  box-shadow:6px 6px 16px var(--sh-d),-3px -3px 8px var(--sh-l);
  transition:all .2s;
}
.t-stop:active{transform:scale(.97);background:var(--danger);color:#130e1c;}

/* ===================== MODAL SHEET ===================== */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(7,16,26,0.82);z-index:400;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-bg.on{display:flex;animation:fadeBg .2s ease;}
@keyframes fadeBg{from{opacity:0;}to{opacity:1;}}
.modal-sheet{
  background:var(--surface);border-radius:24px 24px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%;max-width:440px;
  border:1px solid var(--border);border-bottom:none;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.m-handle{width:36px;height:4px;background:var(--surface-3);border-radius:2px;margin:0 auto 18px;}
.m-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.m-meta{font-size:12.5px;color:var(--teal);font-weight:600;margin-bottom:14px;}
.m-desc{font-size:13.5px;color:var(--text-2);line-height:1.65;}
.m-close{
  display:block;width:100%;margin-top:18px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);border-radius:12px;padding:14px;
  font-size:15px;font-weight:600;cursor:pointer;text-align:center;
  font-family:'DM Sans',sans-serif;
}

/* ===================== WEEK TAB ===================== */
.goal-card{
  background:linear-gradient(135deg,var(--surface),var(--surface-2));
  border:1px solid rgba(0,196,180,0.25);
  border-radius:18px;padding:16px;margin-bottom:16px;
  box-shadow:6px 6px 16px var(--sh-d);
}
.goal-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:7px;}
.goal-text{font-size:13.5px;color:var(--text);line-height:1.6;}

.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px;}
.day-card{
  background:var(--surface);border-radius:14px;padding:13px;
  border:1px solid var(--border-2);
  box-shadow:4px 4px 10px var(--sh-d),-2px -2px 6px var(--sh-l);
}
.dc-day{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;}
.dc-name{font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.35;}
.dc-status{font-size:20px;}

.sec-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:11px;margin-top:4px;}

.skill-card{
  background:var(--surface);border-radius:15px;padding:14px;
  margin-bottom:9px;border:1px solid var(--border-2);
  box-shadow:4px 4px 10px var(--sh-d),-2px -2px 6px var(--sh-l);
}
.sk-name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:10px;}
.sk-steps{display:flex;gap:5px;}
.sk-step{
  flex:1;background:var(--surface-2);border:1px solid transparent;
  border-radius:9px;padding:7px 4px;text-align:center;
  font-size:9.5px;color:var(--text-2);cursor:pointer;
  transition:all .2s;line-height:1.35;font-weight:500;
}
.sk-step.on{background:var(--teal-glow);border-color:var(--teal);color:var(--teal);font-weight:700;}

/* ===================== CALENDAR TAB ===================== */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cal-month{font-size:19px;font-weight:700;color:var(--text);}
.cal-arr{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;
  box-shadow:3px 3px 7px var(--sh-d);
}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.cal-dn{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-3);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:12.5px;font-weight:500;
  background:var(--surface);color:var(--text-2);
}
.cal-cell.empty{background:transparent;}
.cal-cell.rest{color:var(--text-3);background:transparent;}
.cal-cell.done{background:rgba(0,212,160,0.13);border:1px solid rgba(0,212,160,0.35);color:var(--ok);font-weight:700;}
.cal-cell.partial{background:var(--orange-glow-2);border:1px solid rgba(255,94,46,0.35);color:var(--orange);font-weight:700;}
.cal-cell.missed{background:rgba(255,59,92,0.08);border:1px solid rgba(255,59,92,0.25);color:var(--danger);}
.cal-cell.today{box-shadow:0 0 0 2px var(--teal);color:var(--teal);font-weight:800;}

.streak-card{
  margin-top:20px;background:var(--surface);border-radius:18px;
  padding:20px;display:flex;align-items:center;gap:16px;
  border:1px solid var(--border-2);
  box-shadow:6px 6px 16px var(--sh-d);
}
.streak-num{font-size:30px;font-weight:800;color:var(--orange);font-family:'Space Grotesk',sans-serif;}
.streak-lbl{font-size:12px;color:var(--text-2);margin-top:2px;}

/* ===================== RECORDS TAB ===================== */
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.add-btn{
  background:var(--teal-glow);border:1px solid rgba(0,196,180,0.35);
  color:var(--teal);border-radius:12px;padding:8px 16px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.add-btn:active{background:var(--teal);color:#130e1c;}

.rec-group{
  background:var(--surface);border-radius:17px;padding:16px;
  margin-bottom:11px;border:1px solid var(--border-2);
  box-shadow:4px 4px 10px var(--sh-d),-2px -2px 6px var(--sh-l);
}
.rg-name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:3px;}
.rg-max{font-size:26px;font-weight:800;color:var(--teal);margin-bottom:10px;font-family:'Space Grotesk',sans-serif;}
.rg-max span{font-size:13px;color:var(--text-2);font-weight:400;font-family:'DM Sans',sans-serif;}
.rg-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);padding:5px 0;border-top:1px solid var(--border-2);}
.rg-row .v{color:var(--text);font-weight:600;}

/* ===================== FORM ===================== */
.form-col{display:flex;flex-direction:column;gap:11px;margin-top:14px;}
.form-grp{display:flex;flex-direction:column;gap:5px;}
.form-grp-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-2);}
.form-sel,.form-inp{
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);border-radius:12px;padding:13px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  width:100%;box-shadow:inset 2px 2px 6px var(--sh-d);
  -webkit-appearance:none;appearance:none;
}
.submit-btn{
  background:linear-gradient(135deg,var(--teal),var(--teal-dim));
  border:none;color:#130e1c;border-radius:12px;
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 20px rgba(0,196,180,0.3);transition:all .2s;
}
.submit-btn:active{transform:scale(.98);}

/* ===================== ONBOARDING ===================== */
#onboard{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:1000;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;text-align:center;
}
#onboard.on{display:flex;}
.ob-icon{font-size:64px;margin-bottom:16px;}
.ob-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:10px;}
.ob-sub{font-size:14px;color:var(--text-2);line-height:1.6;margin-bottom:32px;}
.ob-inp{
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);border-radius:14px;padding:15px 16px;
  font-size:16px;font-family:'DM Sans',sans-serif;
  width:100%;max-width:280px;text-align:center;
  box-shadow:inset 2px 2px 6px var(--sh-d);margin-bottom:16px;
}
.ob-btn{
  background:linear-gradient(135deg,var(--teal),var(--teal-dim));
  border:none;color:#130e1c;border-radius:14px;
  padding:16px 48px;font-size:16px;font-weight:800;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 24px rgba(0,196,180,0.35);
}
</style>
</head>
<body>
<div id="app">

  <!-- TODAY -->
  <div class="tab-content active" id="tab-today">
    <div id="today-inner"></div>
  </div>

  <!-- WEEK -->
  <div class="tab-content" id="tab-week">
    <div id="week-inner"></div>
  </div>

  <!-- CALENDAR -->
  <div class="tab-content" id="tab-calendar">
    <div id="cal-inner"></div>
  </div>

  <!-- RECORDS -->
  <div class="tab-content" id="tab-records">
    <div id="rec-inner"></div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="today"><span class="nav-icon">⚡</span><span>Сегодня</span></button>
    <button class="nav-btn" data-tab="week"><span class="nav-icon">📊</span><span>Неделя</span></button>
    <button class="nav-btn" data-tab="calendar"><span class="nav-icon">📅</span><span>Календарь</span></button>
    <button class="nav-btn" data-tab="records"><span class="nav-icon">🏆</span><span>Рекорды</span></button>
  </nav>
</div>

<!-- TIMER OVERLAY -->
<div id="timer-overlay">
  <div class="t-ex-name" id="t-ex-name"></div>
  <div class="t-phase prep" id="t-phase">ПОДГОТОВКА</div>
  <div class="t-circle">
    <svg viewBox="0 0 210 210"><circle class="t-track" cx="105" cy="105" r="93"/><circle class="t-ring" id="t-ring" cx="105" cy="105" r="93"/></svg>
    <div class="t-num" id="t-num">5</div>
  </div>
  <div class="t-rounds">Раунд <b id="t-cur">1</b> из <b id="t-tot">4</b></div>
  <button class="t-stop" id="t-stop">✕  Стоп</button>
</div>

<!-- EXERCISE INFO MODAL -->
<div class="modal-bg" id="ex-modal">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-title" id="m-name"></div>
    <div class="m-meta" id="m-meta"></div>
    <div class="m-desc" id="m-desc"></div>
    <button class="m-close" id="m-close">Закрыть</button>
  </div>
</div>

<!-- ADD RECORD MODAL -->
<div class="modal-bg" id="rec-modal">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-title">Новый рекорд</div>
    <div class="form-col">
      <div class="form-grp">
        <div class="form-label">Упражнение</div>
        <select class="form-sel" id="rf-ex">
          <option value="pushup">Отжимания (стандарт)</option>
          <option value="knee_pushup">Отжимания с колен</option>
          <option value="wide_pushup">Широкие отжимания</option>
          <option value="glute_bridge">Ягодичный мостик</option>
          <option value="single_bridge">Мостик на одной ноге</option>
          <option value="band_row">Тяга резинки</option>
          <option value="table_row">Горизонтальная тяга под столом</option>
          <option value="sumo_squat">Сумо-приседания</option>
          <option value="plank">Планка (сек)</option>
          <option value="jumprope">Скакалка (сек)</option>

      </div>
      <div class="form-grp-row">
        <div class="form-grp"><div class="form-label">Значение</div><input class="form-inp" type="number" id="rf-val" placeholder="0"></div>
        <div class="form-grp"><div class="form-label">Единица</div><select class="form-sel" id="rf-unit"><option>повт</option><option>сек</option><option>кг</option></select></div>
      </div>

      <button class="submit-btn" id="rf-save">Сохранить</button>

<script>
// ============================================================
// PROGRAM DATA
// ============================================================

const WEEKS = [
  {w:1,  ph:'Знакомство с телом', goal:'Главное сейчас — не объём, а привычка. Тело будет удивлено даже простой нагрузке. Крепатура на 2-й день — норма. Не пропускай — именно первые 2 недели самые важные для формирования привычки.'},
  {w:2,  ph:'Знакомство с телом', goal:'Движения становятся чуть увереннее. Следи за ощущениями — чувствуешь как работают ягодицы в мостике? Если нет — сжимай их в верхней точке осознанно.'},
  {w:3,  ph:'Знакомство с телом', goal:'Финал вводной фазы. Тело адаптировалось к расписанию. Со следующей недели начинаем добавлять объём — будет тяжелее, но это и есть прогресс.'},
  {w:4,  ph:'Строим привычку',    goal:'Добавляем подходы. Ягодицы после четверга должны чувствоваться — это хорошо. Мостик переходит на более сложный вариант: плечи на диване или стуле.'},
  {w:5,  ph:'Строим привычку',    goal:'Середина базовой фазы. Отжимания с наклоном уже должны даваться увереннее. Переходим на более крутой угол — руки ниже, нагрузка больше.'},
  {w:6,  ph:'Строим привычку',    goal:'Спина и ягодицы начинают меняться — первые визуальные результаты уже могут быть заметны. Фиксируй в Рекордах сколько делаешь отжиманий с колен.'},
  {w:7,  ph:'Строим привычку',    goal:'Самая тяжёлая неделя этого блока. Не сокращай отдых между подходами — мышца должна успеть восстановиться для следующего подхода.'},
  {w:8,  ph:'Строим привычку',    goal:'Лёгкая неделя: объём -20%, интенсивность прежняя. Это не слабость — это стратегия. Рост мышц происходит именно в паузах между нагрузками.'},
  {w:9,  ph:'Набираем силу',      goal:'Возвращаем объём. После разгрузки неделя 9 должна ощущаться легче чем 7 — признак того что тело выросло. Начинаем пробовать отжимания с колен.'},
  {w:10, ph:'Набираем силу',      goal:'Хип-траст переходит с резинкой на колени. Ягодицы уже заметно сильнее. Зафиксируй рекорды — сколько мостиков, сколько отжиманий.'},
  {w:11, ph:'Набираем силу',      goal:'Финальная фаза. Нагрузка на пике. Плечи, спина и ягодицы — три приоритета — должны ощущаться принципиально иначе чем в неделю 1.'},
  {w:12, ph:'Набираем силу',      goal:'Отжимания с колен должны идти уверенно. Пробуй первые 2-3 полных отжимания в начале подхода — потом возвращайся на колени. Это нормально.'},
  {w:13, ph:'Финальный рывок',    goal:'Три недели до конца. Мостик на одной ноге — это цель недели. Даже если 5-6 повторов нестабильно — отмечай прогресс в разделе Прогресс.'},
  {w:14, ph:'Финальный рывок',    goal:'Тело сейчас максимально отзывчиво на нагрузку. Не пропускай ни одной тренировки — это самые ценные недели всей программы.'},
  {w:15, ph:'Финальный рывок',    goal:'Предпоследняя неделя. Сними видео и сравни с первой. Разница в осанке, форме движений и объёме будет принципиальной.'},
  {w:16, ph:'Финальный рывок',    goal:'Финал! Сделай фото, зафиксируй рекорды. 4 месяца ты делала это — это не мало, это очень много. Ты стала другой.'},
];

function getWorkout(week, day) {
  const w = week;

  // ── PUSHUP PROGRESSION ──
  const puName = w<=3 ? 'Отжимания от стены' : w<=6 ? 'Наклонные отжимания (руки на стуле)' : w<=10 ? 'Отжимания с колен' : 'Отжимания с колен + попытки полных';
  const puSets = w<=3 ? 3 : 4;
  const puReps = w<=2 ? 12 : w<=4 ? 15 : w<=6 ? 12 : w<=8 ? 15 : w<=10 ? 12 : w<=13 ? 14 : 12;
  const puDesc = w<=3
    ? 'Руки на стене чуть шире плеч, тело под углом. Опускай грудь к стене — возвращай. Чем ближе к стене стоишь — тем легче. Почувствуй как работает грудь.'
    : w<=6
    ? 'Руки на сиденье стула или диване, тело прямое. Опускай грудь к рукам и обратно. Следи чтобы таз не поднимался — тело должно быть одной линией.'
    : w<=10
    ? 'Колени на полу, тело прямое от колен до плеч. Руки чуть шире плеч. Грудь к полу, затем назад. Медленный негатив 2 секунды вниз — взрывно вверх.'
    : 'Начни с 2-3 полных отжиманий если можешь — затем продолжай с колен. Со временем полных будет всё больше. Фиксируй в Рекордах сколько удаётся.';

  // ── GLUTE BRIDGE PROGRESSION ──
  const gbName = w<=3 ? 'Ягодичный мостик' : w<=7 ? 'Хип-траст с опорой на плечи' : w<=11 ? 'Хип-траст с резинкой на коленях' : 'Мостик на одной ноге';
  const gbSets = w<=3 ? 3 : 4;
  const gbReps = w<=2 ? 15 : w<=4 ? 20 : w<=6 ? 22 : w<=8 ? 20 : w<=10 ? 22 : w<=13 ? 15 : 18;
  const gbDesc = w<=3
    ? 'Лёжа на спине, ноги согнуты. Поднимай таз — сожми ягодицы в верхней точке и задержись 2 секунды. Медленно вниз. Чувствуй именно ягодицы, не поясницу.'
    : w<=7
    ? 'Плечи на диване или стуле, ступни на полу. Опускай таз вниз — поднимай с максимальным сжатием ягодиц в верхней точке. Полная амплитуда — значительно эффективнее обычного мостика.'
    : w<=11
    ? 'Резинка чуть выше колен, плечи на диване. Давление коленями наружу против резинки. Поднимай — сжимай — опускай. Двойная нагрузка: и большая, и малая ягодичная.'
    : 'Одна нога вытянута вверх. Поднимай таз только на одной ноге — следи чтобы таз не перекашивался. Делай одинаково с каждой ноги. Это признак слабой стороны.';

  // ── SUPERMAN ──
  const spDur = w<=2?12:w<=4?15:w<=6?18:w<=8?20:w<=10?22:w<=13?25:30;
  const spSets = w<=3 ? 3 : 4;

  // ── BAND ROW ──
  const rowSets = w<=3 ? 3 : 4;
  const rowReps = w<=3?12:w<=6?15:w<=9?15:18;

  // ── DONKEY KICK ──
  const dkReps = w<=3?12:w<=6?15:w<=9?18:20;
  const dkSets = w<=3 ? 3 : 4;

  // ── PLANK ──
  const plDur = w<=2?15:w<=4?20:w<=6?25:w<=8?30:w<=10?40:w<=12?50:w<=14?60:75;

  // ── SQUAT ──
  const sqReps = w<=3?15:w<=6?18:w<=9?20:22;
  const sqSets = w<=3 ? 3 : 4;

  // ── TUESDAY — Спина (акцент) + Ягодицы + Грудь (частота) ──
  // Порядок: составные → изоляция. Свежие мышцы — на тяжёлые упражнения.
  if (day === 'tuesday') return [
    {id:'gb_tue',     name:gbName,                               sets:gbSets, reps:gbReps,    dur:null, rest:100, timer:false,
      desc:gbDesc},
    {id:'band_row',   name:'Тяга резинки в наклоне',            sets:rowSets, reps:rowReps,  dur:null, rest:90,  timer:false,
      desc:'Встань на середину резинки. Наклон вперёд с прямой спиной ~45°. Тяни локти назад сводя лопатки — задержись в верхней точке 1 секунду. Медленно возвращай. Широчайшие — основа широкой спины.'},
    {id:'pu_tue',     name:puName,                               sets:puSets, reps:puReps,    dur:null, rest:90,  timer:false,
      desc:puDesc},
    {id:'superman',   name:'Супермен (удержание)',               sets:spSets, reps:null,      dur:spDur,rest:40,  timer:true,
      desc:'Лёжа на животе, руки вперёд. Одновременно оторви руки и ноги от пола — задержись. Сведи лопатки, взгляд строго вниз. Разгибатели спины — основа красивой осанки.'},
    {id:'pull_apart', name:'Разведение резинки на грудь',       sets:3,       reps:w<=5?15:18,dur:null, rest:60,  timer:false,
      desc:'Держи резинку перед собой прямыми руками. Разводи до касания резинкой груди — сводя лопатки. Медленно возвращай. Задние дельты и ромбовидные.'},
    {id:'band_curl',  name:'Сгибания на бицепс с резинкой',     sets:3,       reps:w<=5?12:15,dur:null, rest:60,  timer:false,
      desc:'Встань на резинку. Сгибай руки к плечам, локти прижаты к корпусу. Медленно опускай 3 секунды. Не раскачивай корпус.'},
    {id:'plank_tue',  name:'Планка',                             sets:3,       reps:null,      dur:plDur,rest:40,  timer:true,
      desc:'Упор на предплечья. Тело — одна прямая линия. Напряги пресс и ягодицы одновременно. Начни с колен если сложно — постепенно переходи на полную форму.'},
  ];

  // ── THURSDAY — Ягодицы (акцент) + Грудь и плечи ──
  // Хип-траст и приседания — первые, пока мышца свежая. Грудь добавлена для частоты.
  if (day === 'thursday') return [
    {id:'gb_thu',     name:gbName,                               sets:gbSets, reps:gbReps,    dur:null, rest:100, timer:false,
      desc:gbDesc},
    {id:'sumo_thu',   name:'Сумо-приседания с резинкой',        sets:sqSets, reps:sqReps,    dur:null, rest:90,  timer:false,
      desc:'Резинка выше колен. Ноги шире плеч, носки 45°. Давление коленями наружу против резинки. Опускайся глубоко — ниже параллели. Внутренняя и большая ягодичные под двойной нагрузкой.'},
    {id:'pu_thu',     name:puName,                               sets:puSets, reps:puReps,    dur:null, rest:90,  timer:false,
      desc:puDesc},
    {id:'dk_thu',     name:'Отведение ноги на четвереньках',    sets:dkSets, reps:dkReps,    dur:null, rest:60,  timer:false,
      desc:'На четвереньках. Поднимай ногу назад и вверх, колено 90°, стопа параллельна потолку. Сожми ягодицу в верхней точке на 1 секунду. Все повторения на одну ногу — потом другую.'},
    {id:'band_press', name:'Жим резинки вперёд (грудь + плечи)',sets:3,       reps:w<=5?12:15,dur:null, rest:60,  timer:false,
      desc:'Встань на резинку, концы у плеч. Жми прямо вперёд. Медленно возвращай — не бросай руки назад. Грудь и передние дельты.'},
    {id:'fh_thu',     name:'Пожарный гидрант с резинкой',       sets:dkSets, reps:dkReps,    dur:null, rest:60,  timer:false,
      desc:'Резинка выше колен. На четвереньках. Поднимай ногу строго в сторону. Малая ягодичная — создаёт округлость сбоку. Сохраняй устойчивость корпуса.'},
    {id:'sidepl_thu', name:'Боковая планка',                    sets:3,       reps:null,      dur:w<=4?15:w<=8?20:25, rest:40, timer:true,
      desc:'На каждую сторону. Упор на предплечье, тело прямое, бёдра не провисают. Боковые мышцы создают линию талии. Начни с колен если сложно.'},
  ];

  // ── SATURDAY — Фулбади (~90 мин), тяжёлая ──
  // Всё тело с полным объёмом. Порядок: ягодицы → спина → грудь → плечи → изоляция → кор.
  if (day === 'saturday') return [
    {id:'jr_s',       name:'Скакалка (разминка)',                sets:1,       reps:null,      dur:w<=4?90:w<=9?120:150, rest:30, timer:true,
      desc:'Умеренный ритм. Разогреться — не выдохнуться. Если запутываешься — прыжки без скакалки и снова. Или бег на месте.'},
    {id:'gb_s',       name:gbName,                               sets:4,       reps:gbReps,    dur:null, rest:100, timer:false,
      desc:gbDesc},
    {id:'sumo_s',     name:'Сумо-приседания с резинкой',        sets:4,       reps:sqReps,    dur:null, rest:90,  timer:false,
      desc:'Резинка выше колен. Ноги широко, носки врозь. Глубокое приседание, колени наружу. Вставай через пятки.'},
    {id:'row_s',      name:'Тяга резинки в наклоне',            sets:4,       reps:rowReps,   dur:null, rest:90,  timer:false,
      desc:'Встань на резинку. Наклон вперёд с прямой спиной. Тяни локти назад — задержись 1 секунду в верхней точке. Медленный возврат.'},
    {id:'sup_s',      name:'Супермен (удержание)',               sets:4,       reps:null,      dur:spDur,rest:40,  timer:true,
      desc:'Лёжа на животе, руки вперёд. Одновременно поднять руки и ноги. Взгляд вниз. Лопатки своди.'},
    {id:'pu_s',       name:puName,                               sets:puSets,  reps:puReps,    dur:null, rest:90,  timer:false,
      desc:puDesc},
    {id:'dk_s',       name:'Отведение ноги на четвереньках',    sets:3,       reps:dkReps,    dur:null, rest:60,  timer:false,
      desc:'На каждую ногу. Поднимай согнутую ногу назад, стопа параллельна потолку. Сожми ягодицу в верхней точке.'},
    {id:'pa_s',       name:'Разведение резинки на грудь',       sets:3,       reps:w<=5?15:18,dur:null, rest:60,  timer:false,
      desc:'Прямые руки с резинкой. Разводи до касания резинкой груди. Своди лопатки. Медленный возврат.'},
    {id:'curtsy_s',   name:'Реверансные выпады',                sets:3,       reps:w<=4?10:12,dur:null, rest:75,  timer:false,
      desc:'Скрести ногу за другой по диагонали назад — опускайся. Чередуй ноги. Внешний рельеф ягодиц.'},
    {id:'lat_raise_s',name:'Разводка резинки в стороны (плечи)',sets:3,       reps:w<=5?12:15,dur:null, rest:60,  timer:false,
      desc:'Встань на резинку. Поднимай руки в стороны до уровня плеч. Полный контроль. Средние дельты — ширина плеч.'},
    {id:'plank_s',    name:'Планка',                             sets:3,       reps:null,      dur:plDur,rest:40,  timer:true,
      desc:'Упор на предплечья. Тело — одна линия. Напряги пресс и ягодицы. Начни с колен если сложно.'},
    {id:'frog_s',     name:'Лягушачий мостик (пульс)',          sets:3,       reps:w<=4?20:25,dur:null, rest:60,  timer:false,
      desc:'Стопы вместе, колени в стороны. Быстрые пульсирующие подъёмы таза. Финал тренировки — добиваем ягодицы.'},
  ];

  // ── SUNDAY — Грудь и плечи (акцент) + Трицепс + Лёгкие ягодицы ──
  // Ягодицы здесь только лёгкая изоляция — суббота слишком близко для тяжёлых.
  // Порядок: составные → изоляция → лёгкие ягодицы в конце как добивка.
  if (day === 'sunday') return [
    {id:'wide_pu_sun',name:w<=6?'Широкие отжимания от стены':'Широкие отжимания с колен', sets:puSets, reps:w<=3?12:w<=7?10:12, dur:null, rest:90, timer:false,
      desc:`Руки шире плеч на 15-20 см. ${w<=3?'Руки на стене — широко.':'Руки на стуле или с колен на полу.'} Локти идут наружу — растяжение в грудных. Формируют объём и форму груди.`},
    {id:'pu_sun',     name:puName,                               sets:puSets, reps:puReps,    dur:null, rest:90,  timer:false,
      desc:puDesc},
    {id:'band_press_sun',name:'Жим резинки вперёд (грудь)',     sets:3,       reps:w<=5?12:15,dur:null, rest:75,  timer:false,
      desc:'Встань на резинку, концы у плеч. Жми прямо вперёд, медленно возвращай. Грудь и передние дельты.'},
    {id:'lat_raise_sun',name:'Разводка резинки в стороны (плечи)',sets:3,     reps:w<=5?12:15,dur:null, rest:60,  timer:false,
      desc:'Встань на резинку. Поднимай руки в стороны до уровня плеч — не выше. Средние дельты — ширина плеч.'},
    {id:'chair_dip',  name:'Отжимания от стула (трицепс)',      sets:3,       reps:w<=4?8:w<=8?10:12, dur:null, rest:75, timer:false,
      desc:'Ладони на краю стула за спиной, ноги согнуты (легче) или вытянуты (сложнее). Локти строго назад — изолируешь трицепс.'},
    {id:'band_tri_sun',name:'Разгибание трицепса с резинкой',   sets:3,       reps:w<=5?12:15,dur:null, rest:60,  timer:false,
      desc:'Закрепи резинку вверху (дверная ручка). Тяни концы вниз разгибая руки. Локти неподвижны у корпуса.'},
    {id:'kickback_sun',name:'Отведение ноги назад с резинкой',  sets:3,       reps:w<=5?15:18,dur:null, rest:60,  timer:false,
      desc:'Резинка вокруг щиколоток. Держись за стену. Отводи прямую ногу назад и вверх. Лёгкая изоляция — добивка ягодиц после субботы.'},
    {id:'frog_sun',   name:'Лягушачий мостик (пульс)',          sets:3,       reps:w<=4?20:25,dur:null, rest:60,  timer:false,
      desc:'Стопы вместе, колени в стороны. Быстрые пульсирующие подъёмы таза. Небольшая амплитуда — лёгкая нагрузка для частоты, не усталость.'},
  ];

  return [];
}

// STORAGE
// ============================================================
const S = {
  get(k, def=null){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

function getStartDate(){ return S.get('wl_start',''); }
function setStartDate(d){ S.set('wl_start',d); }

function getCurrentWeek(){
  const s=getStartDate();
  if(!s)return 1;
  const diff=Math.floor((Date.now()-new Date(s).getTime())/(7*24*3600*1000));
  return Math.max(1,Math.min(16,diff+1));
}

function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function daySlug(){
  return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
}

const TRAINING = new Set(['tuesday','thursday','saturday','sunday']);

const DAY_LABEL={tuesday:'Вторник',thursday:'Четверг',saturday:'Суббота',sunday:'Воскресенье'};
const DAY_WKT={tuesday:'Спина + ягодицы + грудь',thursday:'Ягодицы (акцент) + грудь и плечи',saturday:'Фулбади (длинная)',sunday:'Грудь и плечи + трицепс'};

function getCompleted(dateStr,day){
  return (S.get('wl_done',{})[`${dateStr}-${day}`])||[];
}
function toggleDone(dateStr,day,id){
  const all=S.get('wl_done',{});
  const k=`${dateStr}-${day}`;
  if(!all[k])all[k]=[];
  const i=all[k].indexOf(id);
  if(i===-1)all[k].push(id);else all[k].splice(i,1);
  S.set('wl_done',all);
  return all[k].includes(id);
}
function markDone(dateStr,day,id){
  const all=S.get('wl_done',{});
  const k=`${dateStr}-${day}`;
  if(!all[k])all[k]=[];
  if(!all[k].includes(id))all[k].push(id);
  S.set('wl_done',all);
}
function getSkill(){return S.get('wl_skill',{planche:0,frontlever:0,muscleup:0,handstand:0});}
function setSkill(k,v){const s=getSkill();s[k]=v;S.set('wl_skill',s);}
function getRecs(){return S.get('wl_recs',[]);}
function addRec(r){const a=getRecs();a.push(r);S.set('wl_recs',a);}

// ============================================================
// TIMER
// ============================================================
const CIRC = 2*Math.PI*93; // r=93
let tmState=null,tmInt=null,tmExId=null,tmDay=null,tmDate=null;

function setRing(pct,color){
  const r=document.getElementById('t-ring');
  if(!r)return;
  r.style.strokeDasharray=CIRC;
  r.style.strokeDashoffset=CIRC*(1-pct);
  r.style.stroke=color;
}
function setPhase(phase){
  const el=document.getElementById('t-phase');
  const num=document.getElementById('t-num');
  if(!el||!num)return;
  const map={
    prep:{cls:'prep',lbl:'ПОДГОТОВКА',col:'#9a87b8'},
    work:{cls:'work',lbl:'РАБОТА',col:'var(--teal)'},
    rest:{cls:'rest',lbl:'ОТДЫХ',col:'var(--orange)'},
    done:{cls:'done',lbl:'ГОТОВО!',col:'var(--ok)'},
  };
  const m=map[phase];
  el.className=`t-phase ${m.cls}`;
  el.textContent=m.lbl;
  num.style.color=m.col;
}

function beep(freq,dur,vol=0.25){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch{}
}

function startTimer(ex){
  if(tmInt)clearInterval(tmInt);
  tmExId=ex.id;
  document.getElementById('t-ex-name').textContent=ex.name;
  document.getElementById('t-tot').textContent=ex.sets;
  document.getElementById('timer-overlay').classList.add('on');
  runPrep(ex,1);
}

function runPrep(ex,round){
  setPhase('prep');
  document.getElementById('t-cur').textContent=round;
  let t=5;
  document.getElementById('t-num').textContent=t;
  setRing(1,'#9a87b8');
  beep(440,.15);
  if(tmInt)clearInterval(tmInt);
  tmInt=setInterval(()=>{
    t--;
    document.getElementById('t-num').textContent=t;
    setRing(t/5,'#9a87b8');
    if(t<=0){clearInterval(tmInt);runWork(ex,round);}
  },1000);
}

function runWork(ex,round){
  setPhase('work');
  let t=ex.dur;
  document.getElementById('t-num').textContent=t;
  setRing(1,'#8dd8cc');
  beep(880,.2);
  if(tmInt)clearInterval(tmInt);
  tmInt=setInterval(()=>{
    t--;
    document.getElementById('t-num').textContent=t;
    setRing(t/ex.dur,'#8dd8cc');
    if(t<=0){
      clearInterval(tmInt);
      beep(660,.2);
      if(round>=ex.sets){finishTimer(ex);}
      else{runRest(ex,round);}
    }
  },1000);
}

function runRest(ex,round){
  setPhase('rest');
  let t=ex.rest;
  document.getElementById('t-num').textContent=t;
  setRing(1,'#e8a5c0');
  if(tmInt)clearInterval(tmInt);
  tmInt=setInterval(()=>{
    t--;
    document.getElementById('t-num').textContent=t;
    setRing(t/ex.rest,'#e8a5c0');
    if(t<=3&&t>0)beep(440,.1,.18);
    if(t<=0){clearInterval(tmInt);runPrep(ex,round+1);}
  },1000);
}

function finishTimer(ex){
  setPhase('done');
  document.getElementById('t-num').textContent='✓';
  setRing(1,'#7dd9c4');
  beep(880,.1);setTimeout(()=>beep(1100,.2),150);
  setTimeout(()=>{
    stopTimer();
    markDone(tmDate,tmDay,ex.id);
    renderToday();
  },1600);
}

function stopTimer(){
  if(tmInt)clearInterval(tmInt);
  tmInt=null;
  document.getElementById('timer-overlay').classList.remove('on');
  tmExId=null;
}

// ============================================================
// RENDER TODAY
// ============================================================
let curExercises=[];

function renderToday(){
  const day=daySlug();
  const week=getCurrentWeek();
  const date=todayKey();
  tmDay=day;tmDate=date;
  const el=document.getElementById('today-inner');

  if(!TRAINING.has(day)){
    const jsDay=new Date().getDay();
    const trainingJsDays=[2,4,6,0];
    let nextName='';
    for(let i=1;i<=7;i++){
      const n=(jsDay+i)%7;
      if(trainingJsDays.includes(n)){
        const map={2:'tuesday',4:'thursday',6:'saturday',0:'sunday'};
        nextName=DAY_WKT[map[n]];break;
      }
    }
    el.innerHTML=`
      <div class="page-header">
        <div class="page-title">Сегодня</div>
        <div class="page-sub">Неделя ${week} из 16 · ${WEEKS[week-1].ph}</div>
      </div>
      <div class="rest-screen">
        <div class="rest-icon">😴</div>
        <div class="rest-title">День отдыха</div>
        <div class="rest-next">Следующая тренировка:<br><em>${nextName}</em></div>
      </div>`;
    return;
  }

  const exs=getWorkout(week,day);
  curExercises=exs;
  const done=getCompleted(date,day);
  const doneN=exs.filter(e=>done.includes(e.id)).length;
  const pct=exs.length?Math.round(doneN/exs.length*100):0;

  const exsHTML=exs.map(ex=>{
    const isDone=done.includes(ex.id);
    const metaTxt=ex.timer
      ?`${ex.sets} подх × ${ex.dur}с  ·  отдых ${ex.rest}с`
      :`${ex.sets} × ${ex.reps==='AMRAP'?'AMRAP':ex.reps+' повт'}  ·  отдых ${ex.rest}с`;
    return `
      <div class="ex-item${isDone?' done':''}${ex.skill?' skill':''}" id="ei-${ex.id}">
        <div class="ex-row">
          <div class="ex-check${isDone?' on':''}" onclick="handleCheck('${ex.id}','${date}','${day}')"></div>
          <div class="ex-info" onclick="showExModal('${ex.id}')">
            <div class="ex-name">${ex.name}${ex.skill?` <span class="skill-tag">★ СКИЛЛ</span>`:''}</div>
            <div class="ex-meta">${metaTxt}</div>
          </div>
          ${ex.timer?`<button class="timer-btn" onclick="handleTimer('${ex.id}')">⏱</button>`:''}
        </div>
      </div>`;
  }).join('');

  el.innerHTML=`
    <div class="page-header">
      <div class="page-title">${DAY_LABEL[day]}</div>
      <div class="page-sub">${DAY_WKT[day]}</div>
      <div class="badge">⚡ ${WEEKS[week-1].ph} · Неделя ${week}</div>
    </div>
    <div class="card">
      <div class="prog-wrap">
        <div class="prog-labels"><span>Выполнено</span><strong>${doneN} / ${exs.length}</strong></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    ${exsHTML}`;
}

function handleCheck(id,date,day){
  const was=getCompleted(date,day).includes(id);
  if(!was&&tmExId===id)stopTimer();
  toggleDone(date,day,id);
  renderToday();
}
function handleTimer(id){
  const ex=curExercises.find(e=>e.id===id);
  if(!ex)return;
  if(tmExId)stopTimer();
  startTimer(ex);
}
function showExModal(id){
  const ex=curExercises.find(e=>e.id===id);
  if(!ex)return;
  const meta=ex.timer?`${ex.sets} подх × ${ex.dur}с  ·  отдых ${ex.rest}с`:`${ex.sets} × ${ex.reps==='AMRAP'?'AMRAP':ex.reps+' повт'}  ·  отдых ${ex.rest}с`;
  document.getElementById('m-name').textContent=ex.name;
  document.getElementById('m-meta').textContent=meta;
  document.getElementById('m-desc').textContent=ex.desc;
  document.getElementById('ex-modal').classList.add('on');
}

// ============================================================
// RENDER WEEK
// ============================================================
function renderWeek(){
  const week=getCurrentWeek();
  const meta=WEEKS[week-1];
  const sp=getSkill();
  const skills=[
    {k:'pushup',    n:'💪 Отжимания стандарт',     steps:['С колен','10 подряд','20 подряд','30 подряд']},
    {k:'bridge',    n:'🍑 Мостик на одной ноге',   steps:['2 ноги ×15','1 нога (нест.)','1 нога ×10','1 нога ×20']},
    {k:'plank',     n:'🧘 Планка',                  steps:['20 сек','45 сек','90 сек','3 мин']},
    {k:'jumprope',  n:'⚡ Скакалка без остановки',  steps:['1 мин','3 мин','5 мин','10 мин']},
  ];
  const allDone=S.get('wl_done',{});

  const dayCards=['tuesday','thursday','saturday','sunday'].map(d=>{
    const exs=getWorkout(week,d);
    const keys=Object.keys(allDone).filter(k=>k.endsWith(`-${d}`));
    let status='⬜',sc='';
    if(keys.length){
      const latest=keys.sort().pop();
      const dn=allDone[latest]||[];
      if(dn.length>=exs.length&&dn.length>0){status='✅';sc='color:var(--ok)';}
      else if(dn.length>0){status='🔸';}
    }
    return `<div class="day-card">
      <div class="dc-day">${DAY_LABEL[d]}</div>
      <div class="dc-name">${DAY_WKT[d]}</div>
      <div class="dc-status" style="${sc}">${status}</div>
    </div>`;
  }).join('');

  const skillsHTML=skills.map(s=>{
    const lv=sp[s.k]||0;
    return `<div class="skill-card">
      <div class="sk-name">${s.n}</div>
      <div class="sk-steps">${s.steps.map((st,i)=>`<div class="sk-step${lv===i?' on':''}" onclick="updateSkill('${s.k}',${i})">${st}</div>`).join('')}</div>
    </div>`;
  }).join('');

  document.getElementById('week-inner').innerHTML=`
    <div class="page-header">
      <div class="page-title">Неделя ${week} из 16</div>
      <div class="page-sub">${meta.ph}</div>
    </div>
    <div class="goal-card">
      <div class="goal-label">🎯 Цель недели</div>
      <div class="goal-text">${meta.goal}</div>
    </div>
    <div class="sec-label">ТРЕНИРОВКИ ЭТОЙ НЕДЕЛИ</div>
    <div class="day-grid">${dayCards}</div>
    <div class="sec-label">ЛИЧНЫЙ ПРОГРЕСС</div>
    ${skillsHTML}`;
}
function updateSkill(k,v){setSkill(k,v);renderWeek();}

// ============================================================
// RENDER CALENDAR
// ============================================================
let calDt=new Date();
function renderCalendar(){
  const y=calDt.getFullYear(),m=calDt.getMonth();
  const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const DN=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const firstDay=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const offset=(firstDay+6)%7;
  const today=new Date();
  const allDone=S.get('wl_done',{});
  const week=getCurrentWeek();
  const trMap={2:'tuesday',4:'thursday',6:'saturday',0:'sunday'};

  let cells='';
  for(let i=0;i<offset;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);
    const jsDay=dt.getDay();
    const dayName=trMap[jsDay];
    const ds=`${y}-${m+1}-${d}`;
    const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const isPast=dt<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    let cls='cal-cell';
    if(!dayName){cls+=' rest';}
    else{
      const k=`${ds}-${dayName}`;
      const dn=allDone[k]||[];
      const exCount=getWorkout(week,dayName).length;
      if(isToday)cls+=' today';
      else if(dn.length>=exCount&&dn.length>0)cls+=' done';
      else if(dn.length>0)cls+=' partial';
      else if(isPast&&dayName)cls+=' missed';
    }
    cells+=`<div class="${cls}">${d}</div>`;
  }

  // Streak
  let streak=0;
  // Count consecutive weeks with all 4 training days completed
  const startD=getStartDate();
  if(startD){
    const startMs=new Date(startD).getTime();
    const curW=getCurrentWeek();
    for(let wk=curW-1;wk>=1;wk--){
      const weekStart=new Date(startMs+(wk-1)*7*24*3600*1000);
      let allComplete=true;
      for(const td of['tuesday','thursday','saturday','sunday']){
        // find the date of this training day in that week
        let found=false;
        for(let dd=0;dd<7;dd++){
          const testDt=new Date(weekStart.getTime()+dd*24*3600*1000);
          if(trMap[testDt.getDay()]===td){
            const ds2=`${testDt.getFullYear()}-${testDt.getMonth()+1}-${testDt.getDate()}`;
            const k=`${ds2}-${td}`;
            const dn=allDone[k]||[];
            const exCount=getWorkout(wk,td).length;
            if(dn.length<exCount)allComplete=false;
            found=true;break;
          }
        }
        if(!found)allComplete=false;
      }
      if(allComplete)streak++;else break;
    }
  }

  document.getElementById('cal-inner').innerHTML=`
    <div class="page-header"><div class="page-title">Календарь</div></div>
    <div class="cal-nav">
      <button class="cal-arr" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month">${MN[m]} ${y}</div>
      <button class="cal-arr" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-hdr">${DN.map(n=>`<div class="cal-dn">${n}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="streak-card">
      <div style="font-size:34px">🔥</div>
      <div>
        <div class="streak-num">${streak}</div>
        <div class="streak-lbl">недель подряд без пропусков</div>
      </div>
    </div>`;
}
function changeMonth(d){calDt.setMonth(calDt.getMonth()+d);renderCalendar();}

// ============================================================
// RENDER RECORDS
// ============================================================
const EX_NAMES={pushup:'Отжимания стандарт',knee_pushup:'Отжимания с колен',wide_pushup:'Широкие отжимания',glute_bridge:'Ягодичный мостик',single_bridge:'Мостик на одной ноге',band_row:'Тяга резинки',table_row:'Тяга под столом',sumo_squat:'Сумо-приседания',plank:'Планка',jumprope:'Скакалка',other:'Другое'};
function renderRecords(){
  const recs=getRecs();
  let inner='';
  if(!recs.length){
    inner=`<div class="rest-screen" style="min-height:42vh"><div style="font-size:52px">📈</div><div class="rest-title">Нет записей</div><div class="rest-next">Добавь первый рекорд!</div></div>`;
  } else {
    const g={};
    recs.forEach(r=>{if(!g[r.ex])g[r.ex]=[];g[r.ex].push(r);});
    inner=Object.entries(g).map(([ex,rs])=>{
      const sorted=[...rs].sort((a,b)=>b.val-a.val);
      const max=sorted[0];
      const hist=sorted.slice(1,5);
      return `<div class="rec-group">
        <div class="rg-name">${EX_NAMES[ex]||ex}</div>
        <div class="rg-max">${max.val} <span>${max.unit}</span></div>
        ${hist.map(h=>`<div class="rg-row"><span>${h.date}</span><span class="v">${h.val} ${h.unit}</span></div>`).join('')}
      </div>`;
    }).join('');
  }
  document.getElementById('rec-inner').innerHTML=`
    <div class="rec-header">
      <div class="page-title">Рекорды</div>
      <button class="add-btn" onclick="openRecModal()">+ Добавить</button>
    </div>${inner}`;
}
function openRecModal(){
  const t=new Date();
  document.getElementById('rf-date').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  document.getElementById('rec-modal').classList.add('on');
}

// ============================================================
// ONBOARDING
// ============================================================
function saveStartDate(){
  const v=document.getElementById('ob-date').value;
  if(!v)return;
  setStartDate(v);
  document.getElementById('onboard').classList.remove('on');
  renderToday();
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{
  // Onboard if no start date
  if(!getStartDate()){
    const ob=document.getElementById('onboard');
    const t=new Date();
    document.getElementById('ob-date').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    ob.classList.add('on');
  } else {
    renderToday();
  }

  // Tab switching
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tab=btn.dataset.tab;
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      if(tab==='today')renderToday();
      else if(tab==='week')renderWeek();
      else if(tab==='calendar')renderCalendar();
      else if(tab==='records')renderRecords();
    });
  });

  // Timer stop
  document.getElementById('t-stop').addEventListener('click',stopTimer);

  // Exercise modal
  document.getElementById('m-close').addEventListener('click',()=>document.getElementById('ex-modal').classList.remove('on'));
  document.getElementById('ex-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('on');});

  // Record modal
  document.getElementById('rf-cancel').addEventListener('click',()=>document.getElementById('rec-modal').classList.remove('on'));
  document.getElementById('rec-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('on');});
  document.getElementById('rf-save').addEventListener('click',()=>{
    const ex=document.getElementById('rf-ex').value;
    const val=parseFloat(document.getElementById('rf-val').value);
    const unit=document.getElementById('rf-unit').value;
    const date=document.getElementById('rf-date').value;
    if(!val||isNaN(val))return;
    addRec({ex,val,unit,date});
    document.getElementById('rec-modal').classList.remove('on');
    renderRecords();
  });
});
</script>
